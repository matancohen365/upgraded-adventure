<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDG - פרסם כאן (9x16)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background-color: #FDFCFB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Assistant', sans-serif;
            color: #1A1A1A;
        }

        .ad-container {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #FDFCFB;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        /* ── Ambient Gemstone Effect ── */
        .prism-bg {
            position: absolute;
            inset: -20%;
            background: #FDFCFB;
            z-index: 1;
            filter: blur(90px);
            opacity: 0.75;
        }

        .prism-shape {
            position: absolute;
            border-radius: 50%;
            animation: drift 22s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 700px; height: 1000px;
            background: #E8DCC4; /* Champagne */
            top: 5%; left: 10%;
        }

        .shape-2 {
            width: 800px; height: 900px;
            background: #DCE2E6; /* Silver Blue */
            bottom: 5%; right: -10%;
            animation-delay: -7s;
        }
        
        .shape-3 {
            width: 900px; height: 600px;
            background: #F2E4DF; /* Soft Rose */
            top: 35%; left: -10%;
            animation-delay: -14s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(120px, 100px) rotate(25deg) scale(1.1); }
        }

        /* ── Noise Texture ── */
        .noise-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }

        /* ── Content ── */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 920px;
            height: 1760px;
            display: flex;
            flex-direction: column;
            padding: 80px;
            background: rgba(253, 252, 251, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(26, 26, 26, 0.1);
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
            padding-bottom: 40px;
        }

        .brand-mark {
            font-family: 'Frank Ruhl Libre', serif;
            font-weight: 400;
            font-size: 48px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .meta-text {
            font-family: 'Assistant', sans-serif;
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.6);
            text-align: left;
            line-height: 1.4;
        }

        /* ── Main Body ── */
        .main-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: right;
            padding-top: 80px;
        }

        .headline {
            font-family: 'Frank Ruhl Libre', serif;
            font-weight: 300;
            font-size: 220px;
            line-height: 0.9;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            color: #111;
        }

        .subline {
            font-family: 'Assistant', sans-serif;
            font-weight: 400;
            font-size: 40px;
            line-height: 1.3;
            letter-spacing: 0.08em;
            color: rgba(26, 26, 26, 0.7);
            max-width: 80%;
        }

        /* ── Footer ── */
        .footer {
            display: flex;
            flex-direction: column;
            gap: 60px;
            border-top: 1px solid rgba(26, 26, 26, 0.1);
            padding-top: 60px;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(26, 26, 26, 0.05);
            padding-bottom: 20px;
        }

        .stat-value {
            font-family: 'Frank Ruhl Libre', serif;
            font-weight: 400;
            font-size: 64px;
            direction: ltr;
        }

        .stat-label {
            font-family: 'Assistant', sans-serif;
            font-weight: 300;
            font-size: 18px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.5);
        }

        .cta {
            font-family: 'Assistant', sans-serif;
            font-weight: 600;
            font-size: 24px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 30px 50px;
            background: #1A1A1A;
            color: #FDFCFB;
            transition: all 0.3s ease;
        }

        .cta:hover {
            background: #333;
        }
        
        .cta-arrow {
            font-size: 30px;
        }
    </style>
</head>

<body>
    <div class="ad-container">
        <div class="prism-bg">
            <div class="prism-shape shape-1"></div>
            <div class="prism-shape shape-2"></div>
            <div class="prism-shape shape-3"></div>
        </div>
        <div class="noise-overlay"></div>

        <div class="content-wrapper">
            <div class="header">
                <div class="brand-mark">HDG</div>
                <div class="meta-text">Digital<br>Excellence<br>Est. 2024</div>
            </div>

            <div class="main-body">
                <div class="headline">פרסם<br>כאן</div>
                <div class="subline">הלקוחות שלך כבר בפייסבוק.</div>
            </div>

            <div class="footer">
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">ROI Growth</span>
                        <span class="stat-value">300%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Leads Generated</span>
                        <span class="stat-value">50k+</span>
                    </div>
                </div>
                
                <div class="cta">
                    התחל עכשיו
                    <span class="cta-arrow">←</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
