<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDG - Facebook Page Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background-color: #FDFCFB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Assistant', sans-serif;
            color: #1A1A1A;
        }

        .cover-container {
            width: 1640px;
            height: 624px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FDFCFB;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        /* ── Ambient Gemstone Effect ── */
        .prism-bg {
            position: absolute;
            inset: -20%;
            background: #FDFCFB;
            z-index: 1;
            filter: blur(80px);
            opacity: 0.7;
        }

        .prism-shape {
            position: absolute;
            border-radius: 50%;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 800px; height: 800px;
            background: #E8DCC4; /* Champagne */
            top: -20%; left: 20%;
        }

        .shape-2 {
            width: 700px; height: 700px;
            background: #DCE2E6; /* Silver Blue */
            bottom: -20%; right: 10%;
            animation-delay: -5s;
        }
        
        .shape-3 {
            width: 900px; height: 500px;
            background: #F2E4DF; /* Soft Rose */
            top: 10%; left: 50%;
            animation-delay: -10s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(100px, 40px) rotate(20deg) scale(1.1); }
        }

        /* ── Noise Texture ── */
        .noise-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }

        /* ── Content ── */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 1500px;
            height: 480px;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            padding: 40px 60px;
            background: rgba(253, 252, 251, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(26, 26, 26, 0.1);
        }

        /* ── Left Side (Logo & Meta) ── */
        .left-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 1px solid rgba(26, 26, 26, 0.1);
            padding-left: 60px;
            width: 400px;
        }
        
        .brand-mark {
            font-family: 'Frank Ruhl Libre', serif;
            font-weight: 400;
            font-size: 80px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1;
        }

        .meta-text {
            font-family: 'Assistant', sans-serif;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.6);
            line-height: 1.6;
        }

        /* ── Right Side (Tagline & Stats) ── */
        .right-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            text-align: right;
            flex: 1;
        }
        
        .tagline {
            font-family: 'Frank Ruhl Libre', serif;
            font-weight: 300;
            font-size: 48px;
            line-height: 1.1;
            letter-spacing: -0.01em;
            max-width: 600px;
        }

        .stats-row {
            display: flex;
            gap: 60px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .stat-value {
            font-family: 'Frank Ruhl Libre', serif;
            font-weight: 400;
            font-size: 42px;
            direction: ltr;
        }

        .stat-label {
            font-family: 'Assistant', sans-serif;
            font-weight: 300;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.5);
        }
    </style>
</head>

<body>
    <div class="cover-container">
        <div class="prism-bg">
            <div class="prism-shape shape-1"></div>
            <div class="prism-shape shape-2"></div>
            <div class="prism-shape shape-3"></div>
        </div>
        <div class="noise-overlay"></div>

        <div class="content-wrapper">
            <div class="left-col">
                <div class="brand-mark">HDG</div>
                <div class="meta-text">
                    Digital Excellence<br>
                    Est. 2024<br>
                    Tel Aviv
                </div>
            </div>

            <div class="right-col">
                <div class="tagline">הנוכחות הדיגיטלית שלך,<br>משודרגת לחלוטין.</div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-value">300%</span>
                        <span class="stat-label">Avg. ROI</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">50k+</span>
                        <span class="stat-label">Leads Generated</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
