<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDG - פרסם כאן (1x1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Assistant:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Heebo', sans-serif;
        }

        .ad-container {
            width: 1000px;
            height: 1000px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0B1120;
        }

        /* ── Ambient gradient layers ── */
        .ad-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(37, 99, 235, 0.25) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 20% 80%, rgba(56, 189, 248, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 85% 20%, rgba(245, 158, 11, 0.08) 0%, transparent 50%);
            z-index: 1;
        }

        .ad-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(170deg, transparent 0%, transparent 40%, rgba(37, 99, 235, 0.06) 60%, transparent 80%);
            z-index: 1;
        }

        /* ── Spotlight pulse behind text ── */
        .spotlight {
            position: absolute;
            width: 700px;
            height: 700px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            background: radial-gradient(circle, rgba(37, 99, 235, 0.18) 0%, rgba(56, 189, 248, 0.06) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 2;
            animation: spotlightPulse 4s ease-in-out infinite;
        }

        @keyframes spotlightPulse {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -55%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -55%) scale(1.08); }
        }

        /* ── Subtle grid overlay ── */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 2;
        }

        /* ── Content ── */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            text-align: center;
        }

        /* ── Top brand bar ── */
        .brand-bar {
            position: absolute;
            top: 48px;
            right: 56px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 42px;
            color: #F1F5F9;
            letter-spacing: 0.08em;
            line-height: 1;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            background: #2563EB;
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.6);
        }

        /* ── Metric badge ── */
        .metric-badge {
            position: absolute;
            top: 52px;
            left: 56px;
            display: flex;
            align-items: baseline;
            gap: 6px;
            direction: ltr;
        }

        .metric-number {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 52px;
            color: #F59E0B;
            line-height: 1;
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
        }

        .metric-label {
            font-family: 'Assistant', sans-serif;
            font-weight: 600;
            font-size: 20px;
            color: rgba(241, 245, 249, 0.5);
            letter-spacing: 0.04em;
        }

        /* ── Main headline ── */
        .headline {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 180px;
            color: #F1F5F9;
            line-height: 0.9;
            letter-spacing: -0.02em;
            text-shadow:
                0 0 60px rgba(37, 99, 235, 0.4),
                0 0 120px rgba(37, 99, 235, 0.15);
            margin-bottom: 30px;
        }

        /* ── Subline ── */
        .subline {
            font-family: 'Assistant', sans-serif;
            font-weight: 500;
            font-size: 32px;
            color: rgba(241, 245, 249, 0.55);
            letter-spacing: 0.06em;
            margin-bottom: 50px;
        }

        /* ── CTA ── */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 48px;
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            border-radius: 60px;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            font-size: 26px;
            color: #fff;
            letter-spacing: 0.02em;
            box-shadow:
                0 4px 24px rgba(37, 99, 235, 0.35),
                0 0 60px rgba(37, 99, 235, 0.12);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cta-arrow {
            display: inline-block;
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        /* ── Bottom decorative line ── */
        .bottom-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #2563EB 30%, #38BDF8 50%, #2563EB 70%, transparent);
        }

        /* ── Corner accents ── */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            z-index: 10;
        }

        .corner--tl {
            top: 30px;
            right: 30px;
            border-top: 2px solid rgba(37, 99, 235, 0.3);
            border-right: 2px solid rgba(37, 99, 235, 0.3);
        }

        .corner--br {
            bottom: 30px;
            left: 30px;
            border-bottom: 2px solid rgba(37, 99, 235, 0.3);
            border-left: 2px solid rgba(37, 99, 235, 0.3);
        }

        /* ── Floating particles ── */
        .particle {
            position: absolute;
            border-radius: 50%;
            z-index: 3;
            opacity: 0;
            animation: particleFloat 6s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            width: 6px; height: 6px;
            background: #38BDF8;
            top: 25%; left: 15%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 4px; height: 4px;
            background: #F59E0B;
            top: 70%; right: 20%;
            animation-delay: 2s;
        }

        .particle:nth-child(3) {
            width: 5px; height: 5px;
            background: #2563EB;
            top: 15%; right: 35%;
            animation-delay: 4s;
        }

        @keyframes particleFloat {
            0%, 100% { opacity: 0; transform: translateY(0); }
            20% { opacity: 0.6; }
            50% { opacity: 0.8; transform: translateY(-20px); }
            80% { opacity: 0.4; }
        }
    </style>
</head>

<body>
    <div class="ad-container">
        <div class="spotlight"></div>
        <div class="grid-overlay"></div>

        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="corner corner--tl"></div>
        <div class="corner corner--br"></div>

        <div class="content-wrapper">
            <div class="brand-bar">
                <div class="brand-dot"></div>
                <div class="brand-mark">HDG</div>
            </div>

            <div class="metric-badge">
                <span class="metric-number">300%</span>
                <span class="metric-label">ROI</span>
            </div>

            <div class="headline">פרסם<br>כאן</div>
            <div class="subline">הלקוחות שלך כבר בפייסבוק</div>
            <div class="cta">
                <span class="cta-arrow">←</span>
                התחל עכשיו
            </div>
        </div>

        <div class="bottom-accent"></div>
    </div>
</body>

</html>
