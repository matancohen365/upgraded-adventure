<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDG - Logo (1x1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@900&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .ad-container {
            width: 1000px;
            height: 1000px;
            position: relative;
            overflow: hidden;
            background: #E2FF00; /* High-visibility Neon Chartreuse */
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── Grid overlay ── */
        .ruler-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(#000 2px, transparent 2px),
                linear-gradient(90deg, #000 2px, transparent 2px);
            background-size: 100px 100px;
            opacity: 0.1;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Content ── */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-block {
            background: #000;
            color: #E2FF00;
            padding: 60px 80px;
            box-shadow: -20px 20px 0px #0038FF; /* Electric blue drop shadow */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 280px;
            line-height: 0.8;
            letter-spacing: -0.04em;
        }
        
        .logo-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 32px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

    </style>
</head>
<body>
    <div class="ad-container">
        <div class="ruler-overlay"></div>

        <div class="content">
            <div class="logo-block">
                <div class="logo-text">HDG</div>
                <div class="logo-sub">Performance</div>
            </div>
        </div>
    </div>
</body>
</html>
