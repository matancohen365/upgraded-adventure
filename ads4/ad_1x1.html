<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDG - Performance Ad (1x1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@900&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .ad-container {
            width: 1000px;
            height: 1000px;
            position: relative;
            overflow: hidden;
            background: #E2FF00; /* High-visibility Neon Chartreuse */
            color: #000000;
            display: flex;
            flex-direction: column;
        }

        /* ── Scrolling Ticker Signature ── */
        .ticker-wrapper {
            position: absolute;
            top: 50%;
            left: -50%;
            width: 200%;
            transform: translateY(-50%) rotate(-5deg);
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
            overflow: hidden;
            display: flex;
        }

        .ticker-track {
            display: flex;
            white-space: nowrap;
            animation: scroll 20s linear infinite;
        }

        .ticker-text {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 240px;
            line-height: 1;
            padding: 0 40px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); /* Moving right because RTL text is tricky, but CSS translate is physical */ }
        }

        /* ── Grid/Ruler overlay for data aesthetic ── */
        .ruler-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(#000 1px, transparent 1px),
                linear-gradient(90deg, #000 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.05;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Content ── */
        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 80px;
            justify-content: space-between;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-badge {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 24px;
            background: #000;
            color: #E2FF00;
            padding: 12px 24px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-block {
            text-align: left;
            direction: ltr;
        }

        .stat-number {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 80px;
            line-height: 0.9;
            letter-spacing: -0.05em;
        }
        
        .stat-label {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 18px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Hero Copy */
        .hero-block {
            margin: auto 0;
        }

        .headline {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 150px;
            line-height: 0.9;
            letter-spacing: -0.03em;
            margin-bottom: 30px;
        }

        .subline {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 32px;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 12px 24px;
        }

        /* Bottom Bar */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .barcode {
            width: 200px;
            height: 60px;
            background: 
                linear-gradient(90deg, 
                    #000 0%, #000 5%, transparent 5%, transparent 10%,
                    #000 10%, #000 20%, transparent 20%, transparent 25%,
                    #000 25%, #000 28%, transparent 28%, transparent 35%,
                    #000 35%, #000 45%, transparent 45%, transparent 55%,
                    #000 55%, #000 60%, transparent 60%, transparent 70%,
                    #000 70%, #000 85%, transparent 85%, transparent 92%,
                    #000 92%, #000 100%
                );
        }

        /* High-contrast Action CTA */
        .cta {
            background: #0038FF; /* Electric Hyperlink Blue */
            color: #FFF;
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 42px;
            padding: 24px 48px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            box-shadow: -12px 12px 0px #000;
            transition: transform 0.1s, box-shadow 0.1s;
            cursor: pointer;
        }

        .cta:hover {
            transform: translate(-4px, 4px);
            box-shadow: -8px 8px 0px #000;
        }

        .cta-arrow {
            font-size: 48px;
            line-height: 0.5;
        }

    </style>
</head>
<body>
    <div class="ad-container">
        <!-- Background Ticker Signature -->
        <div class="ticker-wrapper">
            <div class="ticker-track">
                <span class="ticker-text">ROI • SCALE • LEADS • GROWTH • </span>
                <span class="ticker-text">ROI • SCALE • LEADS • GROWTH • </span>
            </div>
        </div>

        <div class="ruler-overlay"></div>

        <div class="content">
            <div class="top-bar">
                <div class="brand-badge">HDG Agency</div>
                <div class="stat-block">
                    <div class="stat-number">+300%</div>
                    <div class="stat-label">Avg ROI Increase</div>
                </div>
            </div>

            <div class="hero-block">
                <div class="headline">יותר לידים.<br>פחות תירוצים.</div>
                <div class="subline">אנחנו מביאים תוצאות, לא לייקים.</div>
            </div>

            <div class="bottom-bar">
                <div class="barcode"></div>
                <div class="cta">
                    תביאו לי לקוחות
                    <span class="cta-arrow">←</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
