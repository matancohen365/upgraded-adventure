<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDG - Facebook Page Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@900&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .cover-container {
            width: 1640px;
            height: 624px;
            position: relative;
            overflow: hidden;
            background: #E2FF00; /* High-visibility Neon Chartreuse */
            color: #000000;
            display: flex;
        }

        /* ── Scrolling Ticker Signature ── */
        .ticker-wrapper {
            position: absolute;
            top: 50%;
            left: -10%;
            width: 120%;
            transform: translateY(-50%);
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
            overflow: hidden;
            display: flex;
        }

        .ticker-track {
            display: flex;
            white-space: nowrap;
            animation: scroll 15s linear infinite;
        }

        .ticker-text {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 380px;
            line-height: 1;
            padding: 0 40px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); }
        }

        /* ── Grid/Ruler overlay ── */
        .ruler-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(#000 2px, transparent 2px),
                linear-gradient(90deg, #000 2px, transparent 2px);
            background-size: 80px 80px;
            opacity: 0.05;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Content ── */
        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            padding: 60px 80px;
            justify-content: space-between;
            align-items: center;
        }

        /* Left side / Brand (visual right because RTL) */
        .brand-block {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 140px;
            line-height: 0.8;
            background: #000;
            color: #E2FF00;
            padding: 20px 40px;
            display: inline-block;
            box-shadow: -12px 12px 0px #0038FF;
            align-self: flex-start;
        }

        .subline {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 32px;
            background: #fff;
            color: #000;
            padding: 12px 24px;
            display: inline-block;
            align-self: flex-start;
            border: 4px solid #000;
        }

        /* Right side / Copy & Stats (visual left) */
        .performance-block {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 40px;
            text-align: right;
        }

        .headline {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 90px;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .stats-row {
            display: flex;
            gap: 50px;
            direction: ltr;
        }

        .stat-item {
            text-align: left;
            background: #000;
            color: #fff;
            padding: 20px 30px;
        }

        .stat-number {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 60px;
            line-height: 0.9;
            color: #E2FF00;
        }
        
        .stat-label {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            margin-top: 8px;
            color: #fff;
        }

    </style>
</head>
<body>
    <div class="cover-container">
        
        <div class="ticker-wrapper">
            <div class="ticker-track">
                <span class="ticker-text">RESULTS • DATA • SCALE • </span>
                <span class="ticker-text">RESULTS • DATA • SCALE • </span>
            </div>
        </div>

        <div class="ruler-overlay"></div>

        <div class="content">
            <div class="brand-block">
                <div class="logo">HDG</div>
                <div class="subline">Performance Agency</div>
            </div>

            <div class="performance-block">
                <div class="headline">יותר לידים.<br>פחות תירוצים.</div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-number">+300%</div>
                        <div class="stat-label">Avg ROI Increase</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">50K+</div>
                        <div class="stat-label">Leads Generated</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
