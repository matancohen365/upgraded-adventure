<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDG - Performance Ad (9x16)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@900&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .ad-container {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
            background: #E2FF00; /* High-visibility Neon Chartreuse */
            color: #000000;
            display: flex;
            flex-direction: column;
        }

        /* ── Scrolling Ticker Signature (Multiple for Story) ── */
        .ticker-wrapper {
            position: absolute;
            width: 250%;
            left: -75%;
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
            display: flex;
        }

        .ticker-1 { top: 20%; transform: rotate(10deg); }
        .ticker-2 { top: 50%; transform: rotate(-5deg); opacity: 0.3; }
        .ticker-3 { top: 80%; transform: rotate(15deg); }

        .ticker-track {
            display: flex;
            white-space: nowrap;
            animation: scroll 25s linear infinite;
        }

        .ticker-text {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 280px;
            line-height: 1;
            padding: 0 40px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(50%); }
        }

        /* ── Grid/Ruler overlay ── */
        .ruler-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(#000 2px, transparent 2px),
                linear-gradient(90deg, #000 2px, transparent 2px);
            background-size: 120px 120px;
            opacity: 0.05;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Content ── */
        .content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 100px 80px;
            justify-content: space-between;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 60px;
        }

        .brand-badge {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 40px;
            background: #000;
            color: #E2FF00;
            padding: 20px 40px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Hero Copy */
        .hero-block {
            margin: auto 0;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .headline {
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 200px;
            line-height: 0.88;
            letter-spacing: -0.03em;
        }

        .subline {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 48px;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 24px 40px;
            align-self: flex-start;
            line-height: 1.3;
        }

        /* Bottom Bar */
        .bottom-bar {
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        .stats-block {
            display: flex;
            justify-content: space-between;
            direction: ltr;
            padding-top: 60px;
            border-top: 8px solid #000;
        }

        .stat-item {
            text-align: left;
        }

        .stat-number {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 90px;
            line-height: 0.9;
            letter-spacing: -0.05em;
        }
        
        .stat-label {
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            font-size: 24px;
            text-transform: uppercase;
            margin-top: 12px;
        }

        /* High-contrast Action CTA */
        .cta {
            background: #0038FF; /* Electric Hyperlink Blue */
            color: #FFF;
            font-family: 'Heebo', sans-serif;
            font-weight: 900;
            font-size: 60px;
            padding: 40px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: -16px 16px 0px #000;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .cta:hover {
            transform: translate(-4px, 4px);
            box-shadow: -12px 12px 0px #000;
        }

        .cta-arrow {
            font-size: 70px;
            line-height: 0.5;
        }

    </style>
</head>
<body>
    <div class="ad-container">
        
        <!-- Multiple Background Tickers for vertical format -->
        <div class="ticker-wrapper ticker-1">
            <div class="ticker-track">
                <span class="ticker-text">GROWTH • SCALE • GROWTH • SCALE • </span>
                <span class="ticker-text">GROWTH • SCALE • GROWTH • SCALE • </span>
            </div>
        </div>
        <div class="ticker-wrapper ticker-2">
            <div class="ticker-track" style="animation-direction: reverse; animation-duration: 30s;">
                <span class="ticker-text">RESULTS ONLY • RESULTS ONLY • </span>
                <span class="ticker-text">RESULTS ONLY • RESULTS ONLY • </span>
            </div>
        </div>
        <div class="ticker-wrapper ticker-3">
            <div class="ticker-track">
                <span class="ticker-text">ROI • LEADS • ROI • LEADS • </span>
                <span class="ticker-text">ROI • LEADS • ROI • LEADS • </span>
            </div>
        </div>

        <div class="ruler-overlay"></div>

        <div class="content">
            <div class="top-bar">
                <div class="brand-badge">HDG Agency</div>
            </div>

            <div class="hero-block">
                <div class="headline">יותר לידים.<br>פחות<br>תירוצים.</div>
                <div class="subline">אנחנו מביאים תוצאות,<br> לא לייקים.</div>
            </div>

            <div class="bottom-bar">
                <div class="stats-block">
                    <div class="stat-item">
                        <div class="stat-number">+300%</div>
                        <div class="stat-label">Avg ROI</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">50K+</div>
                        <div class="stat-label">Leads</div>
                    </div>
                </div>

                <div class="cta">
                    תביאו לי לקוחות
                    <span class="cta-arrow">←</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
